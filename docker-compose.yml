services:
  postgres:
    image: postgres:16-alpine
    container_name: moura-postgres
    environment:
      POSTGRES_USER: moura
      POSTGRES_PASSWORD: moura
      POSTGRES_DB: moura_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moura -d moura_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moura-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: moura-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
